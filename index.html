<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tournament.calc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="noise"></div>

  <header>
    <div class="logo">TOURNAMENT<span>.CALC</span></div>
    <nav>
      <button class="nav-btn active" data-tab="teams">Teams</button>
      <button class="nav-btn" data-tab="scoring">Scoring</button>
      <button class="nav-btn" data-tab="leaderboard">Board</button>
      <button class="nav-btn" data-tab="settings">Rules</button>
    </nav>
  </header>

  <main>

    <section id="tab-teams" class="tab active">
      <div class="section-header">
        <h2>Teams</h2>
        <button class="btn-primary" id="openAddTeam">+ Add Team</button>
      </div>
      <div id="teamsList" class="teams-grid"></div>

      <div class="modal-overlay" id="addTeamModal">
        <div class="modal">
          <h3>New Team</h3>
          <input type="text" id="teamNameInput" placeholder="Team name" maxlength="30"/>
          <div id="playerInputs">
            <label>Players</label>
            <div class="player-row">
              <input type="text" class="player-input" placeholder="Player 1"/>
              <button class="remove-player" style="visibility:hidden">X</button>
            </div>
          </div>
          <button class="btn-ghost" id="addPlayerBtn">+ Add Player</button>
          <div class="modal-actions">
            <button class="btn-cancel" id="cancelAddTeam">Cancel</button>
            <button class="btn-primary" id="saveTeamBtn">Save Team</button>
          </div>
        </div>
      </div>
    </section>

    <section id="tab-scoring" class="tab">
      <div class="section-header">
        <h2>Enter Results</h2>
        <div class="match-info">
          <span>Match</span>
          <input type="number" id="matchNumber" value="1" min="1" style="width:50px"/>
        </div>
      </div>
      <div id="scoreEntryList" class="score-list"></div>
      <div class="score-actions">
        <button class="btn-primary" id="submitMatchBtn">Submit Match</button>
      </div>
    </section>

    <section id="tab-leaderboard" class="tab">
      <div class="section-header">
        <h2>Leaderboard</h2>
        <button class="btn-ghost" id="resetBtn">Reset All</button>
      </div>
      <div id="leaderboardList" class="leaderboard"></div>
    </section>

    <section id="tab-settings" class="tab">
      <div class="section-header">
        <h2>Scoring Rules</h2>
        <button class="btn-primary" id="saveRulesBtn">Save Rules</button>
      </div>
      <div class="rules-card">
        <h4>Placement Points</h4>
        <p class="hint">Set points for each placement position</p>
        <div id="placementRules" class="placement-grid"></div>
        <button class="btn-ghost" id="addPlacementBtn">+ Add Position</button>
      </div>
      <div class="rules-card">
        <h4>Kill Points</h4>
        <p class="hint">Points awarded per kill</p>
        <div class="kill-points-row">
          <span>1 kill =</span>
          <input type="number" id="killPointsInput" value="1" min="0" step="0.5"/>
          <span>pts</span>
        </div>
      </div>
    </section>

  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="teams.js"></script>
  <script src="scoring.js"></script>
  <script src="leaderboard.js"></script>
  <script src="app.js"></script>

</body>
</html>

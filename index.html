<html lang="en">
<head>
  <meta charset="UTF-8" />

    :root {
      --bg: #0a0a0a; --surface: #111; --surface2: #1a1a1a; --border: #2a2a2a;
      --accent: #e8ff00; --accent2: #ff4d00; --text: #f0f0f0; --muted: #666;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; }

```
/* HEADER */
header { position:sticky; top:0; z-index:100; background:var(--bg); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
.logo { font-family:var(--font-display); font-size:22px; letter-spacing:2px; white-space:nowrap; }
.logo span { color:var(--accent); }
nav { display:flex; gap:4px; overflow-x:auto; scrollbar-width:none; }
nav::-webkit-scrollbar { display:none; }
.nav-btn { background:none; border:1px solid transparent; color:var(--muted); font-family:var(--font-mono); font-size:11px; padding:6px 12px; border-radius:4px; cursor:pointer; white-space:nowrap; transition:all 0.2s; text-transform:uppercase; letter-spacing:1px; }
.nav-btn:hover { color:var(--text); border-color:var(--border); }
.nav-btn.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }
.nav-btn:disabled { opacity:0.3; cursor:not-allowed; }

/* MAIN */
main { padding:20px; max-width:600px; margin:0 auto; }
.tab { display:none; }
.tab.active { display:block; }

/* SECTION HEADER */
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
.section-header h2 { font-family:var(--font-display); font-size:32px; letter-spacing:2px; }

/* BUTTONS */
.btn-primary { background:var(--accent); color:#000; border:none; padding:10px 18px; font-family:var(--font-mono); font-size:12px; font-weight:700; letter-spacing:1px; border-radius:4px; cursor:pointer; text-transform:uppercase; transition:all 0.15s; }
.btn-primary:hover { background:#fff; }
.btn-ghost { background:none; color:var(--accent); border:1px solid var(--accent); padding:8px 16px; font-family:var(--font-mono); font-size:11px; letter-spacing:1px; border-radius:4px; cursor:pointer; text-transform:uppercase; transition:all 0.15s; }
.btn-ghost:hover { background:var(--accent); color:#000; }
.btn-danger { background:none; color:var(--accent2); border:1px solid var(--accent2); padding:8px 16px; font-family:var(--font-mono); font-size:11px; letter-spacing:1px; border-radius:4px; cursor:pointer; text-transform:uppercase; transition:all 0.15s; }
.btn-danger:hover { background:var(--accent2); color:#fff; }
.btn-cancel { background:none; color:var(--muted); border:1px solid var(--border); padding:10px 18px; font-family:var(--font-mono); font-size:12px; border-radius:4px; cursor:pointer; transition:all 0.15s; }

/* CARDS */
.card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:20px; margin-bottom:14px; }
.card h4 { font-family:var(--font-display); font-size:20px; letter-spacing:1px; margin-bottom:10px; }
.hint { font-family:var(--font-mono); font-size:11px; color:var(--muted); margin-bottom:12px; }

/* INPUTS */
input[type="text"], input[type="number"] { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:10px 14px; color:var(--text); font-family:var(--font-mono); font-size:13px; outline:none; transition:border-color 0.15s; width:100%; }
input[type="text"]:focus, input[type="number"]:focus { border-color:var(--accent); }
label.field-label { font-family:var(--font-mono); font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:5px; }

/* SETUP TAB */
.setup-step { display:none; }
.setup-step.active { display:block; }
.step-indicator { display:flex; gap:8px; margin-bottom:24px; }
.step-dot { width:8px; height:8px; border-radius:50%; background:var(--border); transition:background 0.2s; }
.step-dot.active { background:var(--accent); }
.step-dot.done { background:var(--muted); }

.placement-row { display:grid; grid-template-columns:80px 1fr auto; gap:8px; align-items:center; margin-bottom:8px; }
.placement-row .pos-label { font-family:var(--font-display); font-size:18px; color:var(--accent); }
.remove-btn { background:none; border:1px solid var(--border); color:var(--muted); width:32px; height:32px; border-radius:4px; cursor:pointer; font-size:12px; transition:all 0.15s; flex-shrink:0; }
.remove-btn:hover { border-color:var(--accent2); color:var(--accent2); }

.kill-rate-row { display:flex; align-items:center; gap:12px; font-family:var(--font-mono); font-size:14px; color:var(--muted); }
.kill-rate-row input { width:80px; text-align:center; font-size:20px; font-weight:500; }

/* TEAMS */
.teams-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.team-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; position:relative; transition:border-color 0.2s; }
.team-card:hover { border-color:var(--accent); }
.team-card-name { font-family:var(--font-display); font-size:20px; letter-spacing:1px; color:var(--accent); margin-bottom:6px; }
.team-card-players { font-family:var(--font-mono); font-size:11px; color:var(--muted); line-height:1.8; }
.team-delete { position:absolute; top:10px; right:10px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; transition:color 0.15s; }
.team-delete:hover { color:var(--accent2); }
.player-row { display:flex; gap:8px; align-items:center; margin-top:6px; }
.player-row input { flex:1; }
.empty-state { grid-column:1/-1; text-align:center; padding:40px 20px; color:var(--muted); font-family:var(--font-mono); font-size:13px; border:1px dashed var(--border); border-radius:8px; }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:200; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; width:100%; max-width:440px; display:flex; flex-direction:column; gap:14px; max-height:90vh; overflow-y:auto; }
.modal h3 { font-family:var(--font-display); font-size:24px; letter-spacing:1px; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:4px; }

/* SCORING */
.match-header { display:flex; align-items:center; gap:10px; font-family:var(--font-mono); font-size:13px; color:var(--muted); margin-bottom:16px; }
.match-header input { width:60px; text-align:center; }
.score-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:10px; overflow:hidden; }
.score-card-header { padding:14px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
.score-team-name { font-family:var(--font-display); font-size:20px; letter-spacing:1px; }
.score-placement { display:flex; align-items:center; gap:8px; }
.score-placement label { font-family:var(--font-mono); font-size:10px; color:var(--muted); text-transform:uppercase; }
.score-placement input { width:70px; text-align:center; font-size:16px; font-weight:500; }
.score-players { padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
.score-player-row { display:flex; align-items:center; justify-content:space-between; }
.score-player-name { font-family:var(--font-mono); font-size:12px; color:var(--muted); }
.score-player-kills { display:flex; align-items:center; gap:8px; }
.score-player-kills label { font-family:var(--font-mono); font-size:10px; color:var(--muted); text-transform:uppercase; }
.score-player-kills input { width:60px; text-align:center; font-size:15px; }
.score-card-footer { padding:10px 16px; background:var(--surface2); display:flex; justify-content:space-between; align-items:center; font-family:var(--font-mono); font-size:11px; color:var(--muted); }
.score-card-footer span { color:var(--accent); font-size:14px; font-weight:500; }

/* LEADERBOARD */
.lb-table { width:100%; border-collapse:collapse; }
.lb-table thead tr { border-bottom:2px solid var(--accent); }
.lb-table th { font-family:var(--font-mono); font-size:10px; color:var(--accent); text-transform:uppercase; letter-spacing:1px; padding:10px 8px; text-align:right; }
.lb-table th:first-child { text-align:left; }
.lb-table th:nth-child(2) { text-align:left; }
.lb-table tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
.lb-table tbody tr:hover { background:var(--surface); }
.lb-table tbody tr.rank-1 { background:rgba(255,215,0,0.06); }
.lb-table tbody tr.rank-2 { background:rgba(192,192,192,0.04); }
.lb-table tbody tr.rank-3 { background:rgba(205,127,50,0.04); }
.lb-table td { padding:12px 8px; font-family:var(--font-mono); font-size:13px; text-align:right; }
.lb-table td:first-child { text-align:center; font-family:var(--font-display); font-size:20px; width:40px; }
.lb-table td:nth-child(2) { text-align:left; font-family:var(--font-display); font-size:18px; letter-spacing:1px; }
.lb-table td.tp { color:var(--accent); font-family:var(--font-display); font-size:22px; }
.lb-table td.pp { color:#aaa; }
.lb-table td.kills { color:var(--accent2); }

/* KILLBOARD */
.kb-table { width:100%; border-collapse:collapse; }
.kb-table thead tr { border-bottom:2px solid var(--accent2); }
.kb-table th { font-family:var(--font-mono); font-size:10px; color:var(--accent2); text-transform:uppercase; letter-spacing:1px; padding:10px 8px; text-align:right; }
.kb-table th:first-child { text-align:left; width:40px; }
.kb-table th:nth-child(2) { text-align:left; }
.kb-table tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
.kb-table tbody tr:hover { background:var(--surface); }
.kb-table td { padding:12px 8px; font-family:var(--font-mono); font-size:13px; text-align:right; }
.kb-table td:first-child { text-align:center; font-family:var(--font-display); font-size:20px; width:40px; }
.kb-table td:nth-child(2) { text-align:left; }
.kb-table td.kill-count { color:var(--accent2); font-family:var(--font-display); font-size:22px; }

/* TOAST */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--accent); color:#000; font-family:var(--font-mono); font-size:12px; font-weight:700; letter-spacing:1px; padding:12px 24px; border-radius:6px; z-index:999; transition:transform 0.3s ease; text-transform:uppercase; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }

/* MISC */
.divider { border:none; border-top:1px solid var(--border); margin:16px 0; }
.row { display:flex; gap:10px; align-items:center; }
.tag { font-family:var(--font-mono); font-size:10px; background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:3px 8px; color:var(--muted); }
.tag.green { border-color:#00ff88; color:#00ff88; }
@media(max-width:400px) { .teams-grid { grid-template-columns:1fr; } }

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let teams = [];
let matches = [];
let rules = {
  killRate: 1,
  placements: [
    { position: 1, points: 20 },
    { position: 2, points: 15 },
    { position: 3, points: 12 },
    { position: 4, points: 10 },
    { position: 5, points: 8 },
  ]
};
let db = null, useFirebase = false;

// ═══════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════
try {
  firebase.initializeApp({
    apiKey: "AIzaSyBl7sciwMVSVFVj9wfpOCZ9t8yvBjaQwsE",
    authDomain: "tournament-f1015.firebaseapp.com",
    projectId: "tournament-f1015",
    storageBucket: "tournament-f1015.firebasestorage.app",
    messagingSenderId: "649492665434",
    appId: "1:649492665434:web:ad74c25d85be57504eb463"
  });
  db = firebase.firestore();
  useFirebase = true;
} catch(e) { console.warn("Firebase unavailable, using localStorage"); }

async function dbGet(col, orderField) {
  if (useFirebase) {
    try {
      const q = orderField ? db.collection(col).orderBy(orderField) : db.collection(col);
      const s = await q.get();
      return s.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) { console.warn(e); }
  }
  return JSON.parse(localStorage.getItem(col) || "[]");
}
async function dbAdd(col, data) {
  if (useFirebase) {
    try { return await db.collection(col).add({ ...data, _ts: Date.now() }); } catch(e) { console.warn(e); }
  }
  const all = JSON.parse(localStorage.getItem(col) || "[]");
  data.id = Date.now().toString(); data._ts = Date.now();
  all.push(data); localStorage.setItem(col, JSON.stringify(all));
}
async function dbDelete(col, id) {
  if (useFirebase) { try { return await db.collection(col).doc(id).delete(); } catch(e) { console.warn(e); } }
  const all = JSON.parse(localStorage.getItem(col) || "[]");
  localStorage.setItem(col, JSON.stringify(all.filter(x => x.id !== id)));
}
async function dbDeleteAll(col) {
  if (useFirebase) {
    try { const s = await db.collection(col).get(); const b = db.batch(); s.docs.forEach(d => b.delete(d.ref)); return await b.commit(); } catch(e) { console.warn(e); }
  }
  localStorage.removeItem(col);
}
async function dbGetDoc(col, docId) {
  if (useFirebase) { try { const d = await db.collection(col).doc(docId).get(); if (d.exists) return d.data(); } catch(e) { console.warn(e); } }
  const s = localStorage.getItem(col + "_" + docId); return s ? JSON.parse(s) : null;
}
async function dbSetDoc(col, docId, data) {
  if (useFirebase) { try { return await db.collection(col).doc(docId).set(data); } catch(e) { console.warn(e); } }
  localStorage.setItem(col + "_" + docId, JSON.stringify(data));
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
function showToast(msg) {
  let t = document.querySelector(".toast");
  if (!t) { t = document.createElement("div"); t.className = "toast"; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
document.querySelectorAll(".nav-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-" + tab).classList.add("active");
    if (tab === "leaderboard") renderLeaderboard();
    if (tab === "killboard") renderKillboard();
    if (tab === "scoring") renderScoreEntry();
  });
});

// ═══════════════════════════════════════
// SETUP
// ═══════════════════════════════════════
function renderSetupForm() {
  document.getElementById("killRateInput").value = rules.killRate ?? 1;
  const c = document.getElementById("placementRows");
  c.innerHTML = rules.placements.map((p, i) => `
    <div class="placement-row">
      <div class="pos-label">${ordinal(p.position)}</div>
      <input type="number" class="pts-input" value="${p.points}" min="0" step="0.5" placeholder="Points"/>
      <button class="remove-btn" onclick="removePlacementRow(this)">✕</button>
    </div>`).join("");

  const saved = localStorage.getItem("rules_saved");
  document.getElementById("setupStatus").textContent = saved ? "Saved" : "Not saved";
  document.getElementById("setupStatus").className = "tag " + (saved ? "green" : "");
}

function ordinal(n) {
  const s = ["th","st","nd","rd"], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

function addPlacementRow() {
  const rows = document.querySelectorAll(".placement-row");
  const nextPos = rows.length + 1;
  const c = document.getElementById("placementRows");
  const row = document.createElement("div"); row.className = "placement-row";
  row.innerHTML = `
    <div class="pos-label">${ordinal(nextPos)}</div>
    <input type="number" class="pts-input" value="0" min="0" step="0.5" placeholder="Points"/>
    <button class="remove-btn" onclick="removePlacementRow(this)">✕</button>`;
  c.appendChild(row);
}

function removePlacementRow(btn) {
  btn.closest(".placement-row").remove();
  // Re-label positions
  document.querySelectorAll(".placement-row").forEach((row, i) => {
    row.querySelector(".pos-label").textContent = ordinal(i + 1);
  });
}

async function saveSetup() {
  const killRate = parseFloat(document.getElementById("killRateInput").value) || 1;
  const rows = document.querySelectorAll(".placement-row");
  const placements = Array.from(rows).map((row, i) => ({
    position: i + 1,
    points: parseFloat(row.querySelector(".pts-input").value) || 0
  }));
  if (!placements.length) { showToast("Add at least one placement"); return; }
  rules = { killRate, placements };
  await dbSetDoc("config", "rules", rules);
  localStorage.setItem("rules_saved", "1");
  document.getElementById("setupStatus").textContent = "Saved";
  document.getElementById("setupStatus").className = "tag green";
  showToast("Rules saved!");
}

async function loadRules() {
  const saved = await dbGetDoc("config", "rules");
  if (saved) rules = saved;
  renderSetupForm();
}

// ═══════════════════════════════════════
// TEAMS
// ═══════════════════════════════════════
async function loadTeams() {
  teams = await dbGet("teams", "_ts");
  renderTeams();
}

function renderTeams() {
  const c = document.getElementById("teamsList");
  if (!teams.length) {
    c.innerHTML = '<div class="empty-state">No teams yet.<br/>Tap "+ Add Team" to get started.</div>';
    return;
  }
  c.innerHTML = teams.map(t => `
    <div class="team-card">
      <div class="team-card-name">${t.name}</div>
      <div class="team-card-players">${t.players.map(p => "• " + p).join("<br/>")}</div>
      <button class="team-delete" onclick="deleteTeam('${t.id}')">✕</button>
    </div>`).join("");
}

async function deleteTeam(id) {
  if (!confirm("Delete this team?")) return;
  await dbDelete("teams", id);
  await loadTeams();
  showToast("Team removed");
}

function openAddTeamModal() {
  document.getElementById("addTeamModal").classList.add("open");
  document.getElementById("teamNameInput").value = "";
  document.getElementById("playerInputs").innerHTML = `
    <label class="field-label">Players</label>
    <div class="player-row">
      <input type="text" class="player-input" placeholder="Player 1"/>
      <button class="remove-btn" style="visibility:hidden" onclick="removePlayerRow(this)">✕</button>
    </div>`;
  setTimeout(() => document.getElementById("teamNameInput").focus(), 100);
}

function closeAddTeamModal() {
  document.getElementById("addTeamModal").classList.remove("open");
}

function addPlayerRow() {
  const c = document.getElementById("playerInputs");
  const rows = c.querySelectorAll(".player-row");
  rows.forEach(r => r.querySelector(".remove-btn").style.visibility = "visible");
  const count = rows.length + 1;
  const row = document.createElement("div"); row.className = "player-row";
  row.innerHTML = `<input type="text" class="player-input" placeholder="Player ${count}"/><button class="remove-btn" onclick="removePlayerRow(this)">✕</button>`;
  c.appendChild(row);
  row.querySelector("input").focus();
}

function removePlayerRow(btn) {
  btn.closest(".player-row").remove();
  const rows = document.getElementById("playerInputs").querySelectorAll(".player-row");
  if (rows.length === 1) rows[0].querySelector(".remove-btn").style.visibility = "hidden";
}

async function saveTeam() {
  const name = document.getElementById("teamNameInput").value.trim();
  if (!name) { showToast("Enter a team name"); return; }
  const players = Array.from(document.querySelectorAll(".player-input"))
    .map(i => i.value.trim()).filter(Boolean);
  if (!players.length) { showToast("Add at least one player"); return; }
  await dbAdd("teams", { name, players });
  closeAddTeamModal();
  await loadTeams();
  showToast("Team added!");
}

// ═══════════════════════════════════════
// SCORING
// ═══════════════════════════════════════
function getPlacementPts(position) {
  if (!position) return 0;
  const p = rules.placements.find(x => x.position === position);
  return p ? p.points : 0;
}

function renderScoreEntry() {
  const c = document.getElementById("scoreEntryList");
  if (!teams.length) {
    c.innerHTML = '<div class="empty-state">Add teams first before entering scores.</div>';
    return;
  }
  c.innerHTML = teams.map(t => `
    <div class="score-card" data-team-id="${t.id}" data-team-name="${t.name}">
      <div class="score-card-header">
        <div class="score-team-name">${t.name}</div>
        <div class="score-placement">
          <label>Placement</label>
          <input type="number" class="placement-input" min="1" max="99" placeholder="—" oninput="updateCardFooter(this)"/>
        </div>
      </div>
      <div class="score-players">
        ${t.players.map((p, i) => `
          <div class="score-player-row">
            <div class="score-player-name">${p}</div>
            <div class="score-player-kills">
              <label>Kills</label>
              <input type="number" class="kills-input" data-player="${p}" min="0" value="0" oninput="updateCardFooter(this)"/>
            </div>
          </div>`).join("")}
      </div>
      <div class="score-card-footer">
        <div>PP: <span class="pp-display">0</span> &nbsp; Kills: <span class="kills-display">0</span></div>
        <div>TP: <span class="tp-display">0</span></div>
      </div>
    </div>`).join("");
}

function updateCardFooter(input) {
  const card = input.closest(".score-card");
  const placement = parseInt(card.querySelector(".placement-input").value) || 0;
  const killInputs = card.querySelectorAll(".kills-input");
  const totalKills = Array.from(killInputs).reduce((sum, i) => sum + (parseInt(i.value) || 0), 0);
  const pp = getPlacementPts(placement);
  const killPts = totalKills * (rules.killRate || 1);
  const tp = pp + killPts;
  card.querySelector(".pp-display").textContent = pp;
  card.querySelector(".kills-display").textContent = totalKills;
  card.querySelector(".tp-display").textContent = tp;
}

async function submitMatch() {
  const matchNum = parseInt(document.getElementById("matchNumber").value) || 1;
  const cards = document.querySelectorAll(".score-card");
  if (!cards.length) { showToast("No teams to score"); return; }

  let hasPlacement = false;
  const results = [];

  cards.forEach(card => {
    const teamId = card.dataset.teamId;
    const teamName = card.dataset.teamName;
    const placement = parseInt(card.querySelector(".placement-input").value) || 0;
    if (placement > 0) hasPlacement = true;

    const playerKills = {};
    card.querySelectorAll(".kills-input").forEach(i => {
      playerKills[i.dataset.player] = parseInt(i.value) || 0;
    });

    const totalKills = Object.values(playerKills).reduce((a, b) => a + b, 0);
    const pp = getPlacementPts(placement);
    const killPts = totalKills * (rules.killRate || 1);
    const tp = pp + killPts;

    results.push({ teamId, teamName, placement, playerKills, totalKills, pp, killPts, tp });
  });

  if (!hasPlacement) { showToast("Enter at least one placement"); return; }

  await dbAdd("matches", { matchNumber: matchNum, results });
  matches.push({ matchNumber: matchNum, results });

  document.getElementById("matchNumber").value = matchNum + 1;
  cards.forEach(card => {
    card.querySelector(".placement-input").value = "";
    card.querySelectorAll(".kills-input").forEach(i => i.value = "0");
    card.querySelector(".pp-display").textContent = "0";
    card.querySelector(".kills-display").textContent = "0";
    card.querySelector(".tp-display").textContent = "0";
  });

  showToast(`Match ${matchNum} saved!`);
}

// ═══════════════════════════════════════
// LEADERBOARD
// ═══════════════════════════════════════
async function renderLeaderboard() {
  const allMatches = await dbGet("matches", "_ts");
  const c = document.getElementById("leaderboardContainer");

  if (!teams.length) { c.innerHTML = '<div class="empty-state">No teams yet.</div>'; return; }

  // Aggregate per team
  const totals = {};
  teams.forEach(t => { totals[t.id] = { name: t.name, pp: 0, kills: 0, tp: 0, matches: 0 }; });

  allMatches.forEach(m => {
    (m.results || []).forEach(r => {
      if (totals[r.teamId]) {
        totals[r.teamId].pp    += r.pp || 0;
        totals[r.teamId].kills += r.totalKills || 0;
        totals[r.teamId].tp    += r.tp || 0;
        totals[r.teamId].matches += 1;
      }
    });
  });

  const ranked = Object.values(totals).sort((a, b) => b.tp - a.tp);

  if (!ranked.length || ranked.every(t => t.matches === 0)) {
    c.innerHTML = '<div class="empty-state">No match results yet.<br/>Enter scores in the Scoring tab.</div>';
    return;
  }

  const medal = (r) => r === 1 ? "🥇" : r === 2 ? "🥈" : r === 3 ? "🥉" : r;

  c.innerHTML = `
    <table class="lb-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Team</th>
          <th>PP</th>
          <th>Kills</th>
          <th>TP</th>
        </tr>
      </thead>
      <tbody>
        ${ranked.map((t, i) => {
          const rank = i + 1;
          return `<tr class="${rank <= 3 ? "rank-" + rank : ""}">
            <td>${medal(rank)}</td>
            <td>${t.name}</td>
            <td class="pp">${t.pp}</td>
            <td class="kills">${t.kills}</td>
            <td class="tp">${t.tp}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>`;
}

// ═══════════════════════════════════════
// KILLBOARD
// ═══════════════════════════════════════
async function renderKillboard() {
  const allMatches = await dbGet("matches", "_ts");
  const c = document.getElementById("killboardContainer");

  // Aggregate kills per player across all matches
  const playerKills = {};

  allMatches.forEach(m => {
    (m.results || []).forEach(r => {
      Object.entries(r.playerKills || {}).forEach(([player, kills]) => {
        if (!playerKills[player]) playerKills[player] = { player, team: r.teamName, kills: 0 };
        playerKills[player].kills += kills;
      });
    });
  });

  const ranked = Object.values(playerKills).sort((a, b) => b.kills - a.kills);

  if (!ranked.length) {
    c.innerHTML = '<div class="empty-state">No kill data yet.</div>';
    return;
  }

  c.innerHTML = `
    <table class="kb-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Player</th>
          <th>Team</th>
          <th>Kills</th>
        </tr>
      </thead>
      <tbody>
        ${ranked.map((p, i) => `
          <tr>
            <td>${i + 1}</td>
            <td style="text-align:left;font-family:var(--font-mono);font-size:13px">${p.player}</td>
            <td style="text-align:left;font-family:var(--font-mono);font-size:11px;color:var(--muted)">${p.team}</td>
            <td class="kill-count">${p.kills}</td>
          </tr>`).join("")}
      </tbody>
    </table>`;
}

// ═══════════════════════════════════════
// RESET
// ═══════════════════════════════════════
async function resetAll() {
  if (!confirm("Delete ALL match data? Teams and rules stay.")) return;
  await dbDeleteAll("matches");
  matches = [];
  await renderLeaderboard();
  showToast("Scores reset");
}

// ═══════════════════════════════════════
// WIRE UP BUTTONS
// ═══════════════════════════════════════
document.getElementById("saveSetupBtn").addEventListener("click", saveSetup);
document.getElementById("addPlacementBtn").addEventListener("click", addPlacementRow);
document.getElementById("openAddTeam").addEventListener("click", openAddTeamModal);
document.getElementById("cancelAddTeam").addEventListener("click", closeAddTeamModal);
document.getElementById("saveTeamBtn").addEventListener("click", saveTeam);
document.getElementById("addPlayerBtn").addEventListener("click", addPlayerRow);
document.getElementById("addTeamModal").addEventListener("click", function(e) { if (e.target === this) closeAddTeamModal(); });
document.getElementById("submitMatchBtn").addEventListener("click", submitMatch);
document.getElementById("resetBtn").addEventListener("click", resetAll);

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
(async () => {
  try { await loadRules(); } catch(e) { renderSetupForm(); }
  try { await loadTeams(); } catch(e) { renderTeams(); }
  renderScoreEntry();
})();
</script>
